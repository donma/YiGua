<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Content Quality Inspector - Zero1Matrix</title>
  <link rel="stylesheet" href="../src/css/app.css">
</head>
<body>
  <header>
    <div class="logo">Content Quality</div>
    <div class="subtitle">Zero1Matrix v5 文案重複度與禁語檢查</div>
    <nav>
      <a href="../index.html">← 回起卦頁</a>
      <a href="../tools/reading-lab.html">Reading Lab</a>
      <a href="../tools/data-inspector.html">Data Inspector</a>
      <a href="../tools/dictionary-quality-inspector.html">Quality Inspector</a>
      <a href="../tools/hard-correctness-inspector.html">Hard Correctness</a>
      <a href="../tools/content-quality-inspector.html" class="active">Content Quality</a>
      <a href="../tools/v6-peak-inspector.html">v6 Peak</a>
    </nav>
  </header>
  <main>
    <section class="card">
      <h1>v5 Content Quality Report</h1>
      <button id="run">Run Check</button>
      <pre id="report"></pre>
    </section>
  </main>

  <script src="../src/data/reflectionQuestions.data.js"></script>
  <script src="../src/data/actionSuggestions.data.js"></script>
  <script src="../src/data/riskWarnings.data.js"></script>
  <script src="../src/data/contentQualityRules.v5.data.js"></script>
  <script>
    function normalizeText(text, rules) {
      let x = String(text || "");
      for (const name of rules.normalization.replaceCategoryNames || []) {
        x = x.replaceAll(`「${name}」`, "「分類」").replaceAll(name, "分類");
      }
      for (const name of rules.normalization.replaceHexagramNames || []) {
        x = x.replaceAll(`${name}卦`, "某卦").replaceAll(name, "某卦");
      }
      if (rules.normalization.removeNumbers) x = x.replace(/[0-9０-９一二三四五六七八九十百千萬]+/g, "N");
      return x.replace(/\s+/g, "");
    }

    function stats(records, field, rules) {
      const texts = records.map(x => x[field]).filter(Boolean);
      const unique = new Set(texts);
      const normalized = texts.map(t => normalizeText(t, rules));
      const normalizedUnique = new Set(normalized);
      const counts = {};
      for (const n of normalized) counts[n] = (counts[n] || 0) + 1;
      const top = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,8);
      return {
        count: records.length,
        unique: unique.size,
        normalizedUnique: normalizedUnique.size,
        normalizedDuplicateRatio: records.length ? Number((1 - normalizedUnique.size / records.length).toFixed(4)) : 1,
        topNormalizedDuplicates: top
      };
    }

    function forbiddenHits(records, field, rules) {
      const hits = [];
      const allowed = rules.allowedPhrases || [];
      for (const rec of records) {
        const text = rec[field] || "";
        let scan = text;
        for (const phrase of allowed) scan = scan.replaceAll(phrase, "");
        for (const term of rules.forbiddenTerms || []) {
          if (scan.includes(term)) hits.push({ id: rec.id, term, text });
        }
      }
      return hits;
    }

    function runCheck() {
      const D = window.Zero1MatrixData;
      const rules = D.contentQualityRulesV5;
      const reflections = D.reflectionQuestions || [];
      const actions = D.actionSuggestions || [];
      const risks = D.riskWarnings || [];

      const report = {
        reflectionQuestions: stats(reflections, "question", rules),
        actionSuggestions: stats(actions, "text", rules),
        riskWarnings: stats(risks, "text", rules),
        forbiddenHits: [
          ...forbiddenHits(reflections, "question", rules),
          ...forbiddenHits(actions, "text", rules),
          ...forbiddenHits(risks, "text", rules)
        ],
        missingBasis: [
          ...reflections.filter(x => !x.basis || !x.basis.length).map(x => x.id),
          ...actions.filter(x => !x.basis || !x.basis.length).map(x => x.id),
          ...risks.filter(x => !x.basis || !x.basis.length).map(x => x.id)
        ]
      };

      report.status = (
        report.reflectionQuestions.count >= 2304 &&
        report.actionSuggestions.count >= 768 &&
        report.riskWarnings.count >= 768 &&
        report.reflectionQuestions.normalizedUnique >= 180 &&
        report.actionSuggestions.normalizedUnique >= 120 &&
        report.riskWarnings.normalizedUnique >= 120 &&
        report.forbiddenHits.length === 0 &&
        report.missingBasis.length === 0
      ) ? "PASS" : "FAIL";

      return report;
    }

    document.getElementById("run").addEventListener("click", () => {
      document.getElementById("report").textContent = JSON.stringify(runCheck(), null, 2);
    });
  </script>
</body>
</html>
