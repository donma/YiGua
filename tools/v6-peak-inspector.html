<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>2.0.0 Accuracy Release Inspector - 易卦</title>
  <link rel="stylesheet" href="../src/css/app.css">
</head>
<body>
  <header>
    <div class="logo">2.0.0 Accuracy Inspector</div>
    <div class="subtitle">易卦正式資料完整性、品質政策與公開驗收</div>
    <nav>
      <a href="../index.html">← 回起卦頁</a>
      <a href="../tools/reading-lab.html">Reading Lab</a>
      <a href="../tools/data-inspector.html">Data Inspector</a>
      <a href="../tools/dictionary-quality-inspector.html">Quality Inspector</a>
      <a href="../tools/hard-correctness-inspector.html">Hard Correctness</a>
      <a href="../tools/content-quality-inspector.html">Content Quality</a>
      <a href="../tools/v6-peak-inspector.html" class="active">2.0 Accuracy</a>
    </nav>
  </header>
  <main>
    <section class="card">
      <h1>2.0.0-accuracy Release Report</h1>
      <p class="muted">檢查正式資料集的完整覆蓋、機器待擴寫標記、禁語、依據欄位與可信狀態。人工編審待辦會獨立列出，不會冒充機器缺漏。</p>
      <button id="run">執行 2.0.0 驗收</button>
      <pre id="report"></pre>
    </section>
  </main>

  <script src="../src/data/hexagrams.data.js"></script>
  <script src="../src/data/lines.data.js"></script>
  <script src="../src/data/categoryInterpretations.data.js"></script>
  <script src="../src/data/lineCategoryInterpretations.data.js"></script>
  <script src="../src/data/pairInterpretations.data.js"></script>
  <script src="../src/data/actionSuggestions.data.js"></script>
  <script src="../src/data/riskWarnings.data.js"></script>
  <script src="../src/data/reflectionQuestions.data.js"></script>
  <script src="../src/data/dictionaryQualityRules.data.js"></script>
  <script src="../src/data/verificationPolicy.data.js"></script>
  <script>
    const HARD_FORBIDDEN_TERMS = ["必有災禍","不用看醫生","保證賺錢","官司一定贏","馬上辭職","必須分手","必須離婚","穩賺","包贏","不用諮詢專業人士"];
    const CONTEXTUAL_REVIEW_TERMS = ["一定會","必定會","絕對成功","絕對失敗","絕對會","絕對不會","絕對不能"];

    function recordsWithMissingBasis(records) {
      return records.filter(record => !Array.isArray(record.basis) || record.basis.length === 0).map(record => record.id);
    }

    function forbiddenHits(records, terms, allowedPhrases) {
      const hits = [];
      records.forEach(record => {
        let text = JSON.stringify(record);
        allowedPhrases.forEach(phrase => { text = text.replaceAll(phrase, ""); });
        terms.forEach(term => {
          if (text.includes(term)) hits.push({ id: record.id, term });
        });
      });
      return hits;
    }

    function runCheck() {
      const D = window.Zero1MatrixData;
      const datasets = {
        hexagrams: D.hexagrams || [],
        lines: D.lines || [],
        categoryInterpretations: D.categoryInterpretations || [],
        lineCategoryInterpretations: D.lineCategoryInterpretations || [],
        pairInterpretations: D.pairInterpretations || [],
        actionSuggestions: D.actionSuggestions || [],
        riskWarnings: D.riskWarnings || [],
        reflectionQuestions: D.reflectionQuestions || []
      };
      const expected = {
        hexagrams: 64,
        lines: 384,
        categoryInterpretations: 768,
        lineCategoryInterpretations: 4608,
        pairInterpretations: 4096,
        actionSuggestions: 768,
        riskWarnings: 768,
        reflectionQuestions: 2304
      };
      const coverage = Object.fromEntries(Object.entries(datasets).map(([name, records]) => [name, {
        actual: records.length,
        expected: expected[name],
        complete: records.length === expected[name]
      }]));
      const expansionPending = {
        lines: datasets.lines.filter(record => record.needsExpansion === true).length,
        lineCategoryInterpretations: datasets.lineCategoryInterpretations.filter(record => record.needsExpansion === true).length,
        pairInterpretations: datasets.pairInterpretations.filter(record => record.needsExpansion === true).length
      };
      const modernDatasets = [
        datasets.categoryInterpretations,
        datasets.lineCategoryInterpretations,
        datasets.pairInterpretations,
        datasets.actionSuggestions,
        datasets.riskWarnings,
        datasets.reflectionQuestions
      ];
      const humanEditorialReviewPending = Object.fromEntries(Object.entries(datasets)
        .filter(([name]) => !["hexagrams", "lines"].includes(name))
        .map(([name, records]) => [name, records.filter(record => record.needsHumanReview === true).length]));
      const missingBasis = modernDatasets.flatMap(recordsWithMissingBasis);
      const hardForbidden = forbiddenHits(modernDatasets.flat(), HARD_FORBIDDEN_TERMS, []);
      const contextualLanguageReview = forbiddenHits(modernDatasets.flat(), CONTEXTUAL_REVIEW_TERMS, []);
      const coverageComplete = Object.values(coverage).every(item => item.complete);
      const expansionComplete = Object.values(expansionPending).every(count => count === 0);
      const policyVersion = D.verificationPolicy?.version || null;

      return {
        releaseVersion: "2.0.0-accuracy",
        status: coverageComplete && expansionComplete && missingBasis.length === 0 && hardForbidden.length === 0 && policyVersion === "2.0.0" ? "PASS" : "FAIL",
        coverage,
        machineExpansionPending: expansionPending,
        humanEditorialReviewPending,
        humanReviewNote: "待真人編審是公開可信狀態，不代表資料缺漏，也不會自動升級為 Reviewed 或 Gold。",
        verificationPolicy: policyVersion,
        hardForbiddenHits: hardForbidden,
        contextualLanguageReview: {
          count: contextualLanguageReview.length,
          note: "一般絕對語詞可能出現在否定、引述或描述性語境，列入人工語境複核，不直接判定為高風險禁語。",
          sample: contextualLanguageReview.slice(0, 20)
        },
        missingBasis
      };
    }

    document.getElementById("run").addEventListener("click", () => {
      document.getElementById("report").textContent = JSON.stringify(runCheck(), null, 2);
    });
  </script>
</body>
</html>
